name: flutter_compass_v2
description: A Flutter compass. The heading varies from 0-360, 0 being north.
version: 1.2.0
homepage: https://github.com/nafiskabbo/flutter_compass_v2
repository: https://github.com/nafiskabbo/flutter_compass_v2
issue_tracker: https://github.com/nafiskabbo/flutter_compass_v2/issues

environment:
  sdk: ">=2.15.0 <4.0.0"
  flutter: ">=1.12.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.hemanthraj.fluttercompass
        pluginClass: FlutterCompassPlugin
      ios:
        pluginClass: FlutterCompassPlugin
