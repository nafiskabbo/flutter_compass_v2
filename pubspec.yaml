name: flutter_device_compass
description: A Flutter compass plugin using device sensors. Heading is 0-360 degrees (0 = north).
version: 2.0.0
homepage: https://github.com/nafiskabbo/flutter_device_compass
repository: https://github.com/nafiskabbo/flutter_device_compass
issue_tracker: https://github.com/nafiskabbo/flutter_device_compass/issues

environment:
  sdk: ">=2.15.0 <4.0.0"
  flutter: ">=1.12.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.hemanthraj.fluttercompass
        pluginClass: FlutterCompassPlugin
      ios:
        pluginClass: FlutterCompassPlugin
